touch tests/.gitkeep
name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest  # O el sistema que estés usando

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'  # Cambia esto si usas otra versión

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt  # Asegúrate de tener pytest en tu requirements_dev.txt

      - name: Run tests with pytest
        run: |
          pytest geogradev/tests/  # Cambiado a la ubicación correcta de las pruebas


